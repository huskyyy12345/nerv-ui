<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NERV UI — Metrics Grid Component</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Display:wght@900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --void: #000; --void-warm: #080807;
  --nerv-orange: #FF9830; --nerv-orange-dim: #C87020;
  --data-green: #50FF50;
  --steel-dim: #888880; --steel-faint: rgba(200,200,192,0.06);
  --font-title: 'Noto Serif Display', serif;
  --font-sys: 'JetBrains Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--void); font-family: var(--font-sys); padding: 40px; }

.panel {
  background: var(--void-warm); border: 1px solid var(--steel-faint);
  width: 400px; margin: 0 auto;
}
.panel-header {
  font-size: 8px; font-weight: 700; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--nerv-orange);
  padding: 6px 10px 5px; border-bottom: 1px solid var(--nerv-orange-dim);
}

.metrics-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 1px; background: var(--steel-faint);
}
.metric-cell {
  background: var(--void-warm); padding: 10px 12px;
}
.metric-cell .m-label {
  font-size: 7px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--nerv-orange); margin-bottom: 2px;
}
.metric-cell .m-value {
  font-size: 18px; font-weight: 700; color: var(--data-green);
  font-variant-numeric: tabular-nums;
  text-shadow: 0 0 6px rgba(80,255,80,0.4), 0 0 12px rgba(80,255,80,0.15);
  line-height: 1.1;
}
.metric-cell .m-sub {
  font-size: 7px; color: var(--steel-dim); margin-top: 2px;
}
.metric-cell.highlight .m-value {
  color: var(--nerv-orange);
  text-shadow: 0 0 6px rgba(255,152,48,0.4);
  font-size: 22px;
}
.metric-cell.zero .m-value {
  font-family: var(--font-title); font-weight: 900; font-size: 28px;
  transform: scaleX(0.85); transform-origin: left;
}
</style>
</head>
<body>

<div class="panel">
  <div class="panel-header">Protocol Metrics — プロトコル指標</div>
  <div class="metrics-grid">
    <div class="metric-cell">
      <div class="m-label">Total TVL</div>
      <div class="m-value">$232.0M</div>
      <div class="m-sub">across 2 vaults</div>
    </div>
    <div class="metric-cell">
      <div class="m-label">Yield Generated (24h)</div>
      <div class="m-value">$284,190</div>
      <div class="m-sub">accrued to collateral</div>
    </div>
    <div class="metric-cell">
      <div class="m-label">Active Positions</div>
      <div class="m-value">4,470</div>
      <div class="m-sub">NFT-based (ERC-8004)</div>
    </div>
    <div class="metric-cell">
      <div class="m-label">Harvests (24h)</div>
      <div class="m-value">847</div>
      <div class="m-sub">MYT strategy harvests</div>
    </div>
    <div class="metric-cell highlight">
      <div class="m-label">Transmuter Buffer</div>
      <div class="m-value">93.0%</div>
      <div class="m-sub">avg across assets</div>
    </div>
    <div class="metric-cell zero">
      <div class="m-label">Liquidations</div>
      <div class="m-value" style="color:var(--data-green)">0 ∞</div>
      <div class="m-sub">by design — 設計上ゼロ</div>
    </div>
  </div>
</div>

</body>
</html>
